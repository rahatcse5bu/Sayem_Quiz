<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Word Meaning Quiz</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:16px;

font-family:"Segoe UI",Arial;

background:linear-gradient(135deg,#667eea,#764ba2);

}



.container{

width:100%;
max-width:450px;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

}



h1{

color:#667eea;

}



h2{

font-size:20px;

color:#333;

}



button{

width:100%;

padding:12px;

margin:7px 0;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

transition:.2s;

}



button:hover{

transform:translateY(-2px);

}



#home button,
#scoreBox button{

background:#667eea;

color:white;

}



#counter{

background:#f1f5ff;

padding:10px;

border-radius:10px;

color:#667eea;

font-weight:bold;

text-align:center;

}




#stats{

display:flex;

gap:10px;

margin:15px 0;

}


#stats div{

flex:1;

background:#f7f8fc;

padding:10px;

border-radius:12px;

text-align:center;

color:#555;

}



#stats b{

display:block;

font-size:22px;

color:#667eea;

}




#options button{

background:#f8fafc;

border:2px solid #e5e7eb;

color:#333;
text-align: left;

}
 



.correct{

background:#03af73!important;

color:white!important;

border:none!important;

}


.wrong{

background:#ed2323!important;

color:white!important;

border:none!important;

}


#quiz,
#scoreBox{

display:none;

}


#score{

font-size:22px;

background:#f7f8fc;

padding:20px;

border-radius:15px;

}


#options button{
word-break:break-word;
overflow-wrap:anywhere;
line-height:1.4;
}


/* ---- Mobile / responsive ---- */
@media (max-width:480px){

.container{
padding:18px;
border-radius:16px;
}

h1{
font-size:24px;
}

h2{
font-size:18px;
}

button{
padding:14px;
font-size:15px;
}

#stats{
gap:6px;
}

#stats div{
padding:8px;
font-size:13px;
}

#stats b{
font-size:18px;
}

#score{
font-size:18px;
padding:16px;
}

}


/* Disable hover lift on touch devices to avoid sticky states */
@media (hover:none){

button:hover{
transform:none;
}

}



</style>

</head>

let current=0;

let totalScore=0;

let roundScore=0;


let totalSolved=0;

let rightAnswer=0;

let wrongAnswer=0;





function startQuiz(){


home.style.display="none";

quiz.style.display="block";


loadQuestion();


}





function loadQuestion(){


let q=questions[current];


counter.innerHTML=
"Question "+current+" / "+questions.length;



question.innerHTML=q.q;


options.innerHTML="";



q.options.forEach(x=>{


let btn=document.createElement("button");


btn.innerHTML=x;


btn.onclick=()=>check(btn,x);



options.appendChild(btn);


});


}





function check(btn,answer){


let buttons=document.querySelectorAll("#options button");


buttons.forEach(b=>b.disabled=true);



let correctAnswer=questions[current].answer;



totalSolved++;



if(answer==correctAnswer){


btn.classList.add("correct");


rightSound();   // 🔊 right answer sound


totalScore++;

roundScore++;

rightAnswer++;


}


else{


btn.classList.add("wrong");


wrongSound();   // 🔊 wrong answer sound


wrongAnswer++;


buttons.forEach(b=>{


if(b.innerHTML==correctAnswer)

b.classList.add("correct");


});


}



updateStats();



setTimeout(()=>{


current++;



if(current%5==0 || current>=questions.length){


showScore();


}

else{


loadQuestion();

}


},1500);



}




function updateStats(){


total.innerHTML=totalSolved;

right.innerHTML=rightAnswer;

wrong.innerHTML=wrongAnswer;


}





function showScore(){


quiz.style.display="none";


scoreBox.style.display="block";


score.innerHTML=

"Round Score : "+roundScore+"/5<br><br>"+

"Total Score : "+totalScore+"/"+current;


roundScore=0;


}





function nextRound(){


scoreBox.style.display="none";


if(current>=questions.length){


alert("Quiz Completed!");

location.reload();


}

else{


quiz.style.display="block";


loadQuestion();


}



}
function rightSound(){

    let ctx = new AudioContext();

    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.type = "sine";

    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); // E5
    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3); // G5


    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.01,
        ctx.currentTime + 0.6
    );


    osc.connect(gain);
    gain.connect(ctx.destination);


    osc.start();
    osc.stop(ctx.currentTime + 0.6);

}





function wrongSound(){

    let ctx = new AudioContext();

    let osc = ctx.createOscillator();
    let gain = ctx.createGain();


    osc.type="square";


    osc.frequency.setValueAtTime(220,ctx.currentTime);
    osc.frequency.setValueAtTime(160,ctx.currentTime+0.25);



    gain.gain.setValueAtTime(0.3,ctx.currentTime);

    gain.gain.exponentialRampToValueAtTime(
        0.01,
        ctx.currentTime+0.5
    );



    osc.connect(gain);
    gain.connect(ctx.destination);


    osc.start();

    osc.stop(ctx.currentTime+0.5);

}


</script>
