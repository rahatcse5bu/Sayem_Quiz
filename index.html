<!DOCTYPE html>

<meta charset="UTF-8">

<title>Quiz Simulator — Meaning, Synonym & Antonym</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:16px;

font-family:"Segoe UI",Arial;

/* default theme (overridden per quiz mode) */
--g1:#667eea;
--g2:#764ba2;
--accent:#667eea;
--accent-dark:#4f5bd5;
--soft:#f1f5ff;
--card:#ffffff;

background:linear-gradient(135deg,var(--g1),var(--g2));

transition:background .4s ease;

}


body.theme-meaning{
--g1:#667eea; --g2:#764ba2;
--accent:#667eea; --accent-dark:#4f5bd5; --soft:#f1f5ff;
}

body.theme-synonym{
--g1:#ffbad2; --g2:#e64472;
--accent:#d63384; --accent-dark:#c2185b; --soft:#fff0f6;
}

body.theme-antonym{
--g1:#0f172a; --g2:#2563eb;
--accent:#2563eb; --accent-dark:#1d4ed8; --soft:#eef4ff;
}


.container{

width:100%;
max-width:450px;

background:var(--card);

padding:25px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

}


h1{
color:var(--accent);
margin-top:0;
}

.subtitle{
color:#777;
margin-top:-6px;
margin-bottom:18px;
}

h2{
font-size:20px;
color:#333;
}


button{
width:100%;
padding:12px;
margin:7px 0;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}


#home button.mode,
#scoreBox button{
background:var(--accent);
color:white;
font-weight:bold;
}

/* distinct colors for the three mode buttons on the home screen */
#home .mode.meaning{ background:#667eea; }
#home .mode.synonym{ background:#d63384; }
#home .mode.antonym{ background:#2563eb; }


.home-btn{
width:auto;
background:transparent;
color:var(--accent);
font-weight:bold;
padding:6px 4px;
margin:0 0 6px 0;
text-align:left;
}
.home-btn:hover{ transform:none; opacity:.7; }


#counter{
background:var(--soft);
padding:10px;
border-radius:10px;
color:var(--accent);
font-weight:bold;
text-align:center;
}


#stats{
display:flex;
gap:10px;
margin:15px 0;
}

#stats div{
flex:1;
background:var(--soft);
padding:10px;
border-radius:12px;
text-align:center;
color:#555;
}

#stats b{
display:block;
font-size:22px;
color:var(--accent);
}


#options button{
background:#f8fafc;
border:2px solid #e5e7eb;
color:#333;
text-align:left;
word-break:break-word;
overflow-wrap:anywhere;
line-height:1.4;
}


.correct{
background:#03af73!important;
color:white!important;
border:none!important;
}

.wrong{
background:#ed2323!important;
color:white!important;
border:none!important;
}


#quiz,
#scoreBox{
display:none;
}


#score{
font-size:22px;
background:var(--soft);
padding:20px;
border-radius:15px;
}


/* ---- Mobile / responsive ---- */
@media (max-width:480px){

.container{ padding:18px; border-radius:16px; }
h1{ font-size:24px; }
h2{ font-size:18px; }
button{ padding:14px; font-size:15px; }
#stats{ gap:6px; }
#stats div{ padding:8px; font-size:13px; }
#stats b{ font-size:18px; }
#score{ font-size:18px; padding:16px; }

}

/* Disable hover lift on touch devices to avoid sticky states */
@media (hover:none){
button:hover{ transform:none; }
}

</style>

</head>


<body class="theme-meaning">


<div class="container">


<div id="home">

</div>


<div id="quiz">

<button class="home-btn" onclick="goHome()">← Home</button>

<div id="counter">Question 0 / 0</div>

<div id="stats">

<div>Wrong<b id="wrong">0</b></div>

</div>

<h2 id="question"></h2>

<div id="options"></div>

</div>


<div id="scoreBox">

<h1>Score Card</h1>

<h2 id="score"></h2>

<button onclick="nextRound()">Continue</button>
<button class="home-btn" onclick="goHome()">← Back to Home</button>

</div>


</div>

let questions=[];
let current=0;
let totalScore=0;
let roundScore=0;

let totalSolved=0;
let rightAnswer=0;
let wrongAnswer=0;


function startQuiz(mode){

questions = quizSets[mode];

// reset state for a fresh run
current=0;
totalScore=0;
roundScore=0;
totalSolved=0;
rightAnswer=0;
wrongAnswer=0;

// switch the colour theme to match the chosen mode
document.body.className = "theme-"+mode;

updateStats();

document.getElementById("home").style.display="none";
document.getElementById("scoreBox").style.display="none";
document.getElementById("quiz").style.display="block";

loadQuestion();

}


function goHome(){

document.getElementById("quiz").style.display="none";
document.getElementById("scoreBox").style.display="none";
document.getElementById("home").style.display="block";

}


function loadQuestion(){

let q=questions[current];

counter.innerHTML="Question "+(current+1)+" / "+questions.length;

// THIS ENABLES BOLD WORD
question.innerHTML=q.q;

options.innerHTML="";

q.options.forEach(x=>{

let btn=document.createElement("button");
btn.innerHTML=x;
btn.onclick=()=>check(btn,x);
options.appendChild(btn);

});

}


function check(btn,answer){

let buttons=document.querySelectorAll("#options button");
buttons.forEach(b=>b.disabled=true);

let correctAnswer=questions[current].answer;

totalSolved++;

if(answer==correctAnswer){

btn.classList.add("correct");
rightSound();
totalScore++;
roundScore++;
rightAnswer++;

}
else{

btn.classList.add("wrong");
wrongSound();
wrongAnswer++;

buttons.forEach(b=>{
if(b.innerHTML==correctAnswer)
b.classList.add("correct");
});

}

updateStats();

setTimeout(()=>{

current++;

if(current%5==0 || current>=questions.length){
showScore();
}
else{
loadQuestion();
}

},1500);

}


function updateStats(){

total.innerHTML=totalSolved;
right.innerHTML=rightAnswer;
wrong.innerHTML=wrongAnswer;

}


function showScore(){

quiz.style.display="none";
scoreBox.style.display="block";

score.innerHTML=
"Round Score : "+roundScore+"/5<br><br>"+
"Total Score : "+totalScore+"/"+current;

roundScore=0;

}


function nextRound(){

scoreBox.style.display="none";

if(current>=questions.length){

alert("Quiz Completed!");
goHome();

}
else{

quiz.style.display="block";
loadQuestion();

}

}


function rightSound(){

let ctx=new AudioContext();
let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="sine";

osc.frequency.setValueAtTime(523.25,ctx.currentTime);
osc.frequency.setValueAtTime(659.25,ctx.currentTime+0.15);
osc.frequency.setValueAtTime(783.99,ctx.currentTime+0.3);

gain.gain.setValueAtTime(0.3,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.6);

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
osc.stop(ctx.currentTime+0.6);

}


function wrongSound(){

let ctx=new AudioContext();
let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="square";

osc.frequency.setValueAtTime(220,ctx.currentTime);
osc.frequency.setValueAtTime(160,ctx.currentTime+0.25);

gain.gain.setValueAtTime(0.3,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
osc.stop(ctx.currentTime+0.5);

}
