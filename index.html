let current=0;
let totalScore=0;
let roundScore=0;

let totalSolved=0;
let rightAnswer=0;
let wrongAnswer=0;



function startQuiz(){

document.getElementById("home").style.display="none";

document.getElementById("quiz").style.display="block";


loadQuestion();

}




function loadQuestion(){


let q=questions[current];


counter.innerHTML=
"Question "+(current+1)+" / "+questions.length;



// THIS ENABLES BOLD WORD
question.innerHTML=q.q;


options.innerHTML="";



q.options.forEach(x=>{


let btn=document.createElement("button");


btn.innerHTML=x;


btn.onclick=()=>check(btn,x);



options.appendChild(btn);


});


}





function check(btn,answer){


let buttons=document.querySelectorAll("#options button");


buttons.forEach(b=>b.disabled=true);



let correctAnswer=questions[current].answer;


totalSolved++;



if(answer==correctAnswer){


btn.classList.add("correct");


rightSound();


totalScore++;

roundScore++;

rightAnswer++;


}


else{


btn.classList.add("wrong");


wrongSound();


wrongAnswer++;



buttons.forEach(b=>{


if(b.innerHTML==correctAnswer)

b.classList.add("correct");


});


}



updateStats();



setTimeout(()=>{


current++;


if(current%5==0 || current>=questions.length){


showScore();


}

else{


loadQuestion();


}


},1500);



}





function updateStats(){


total.innerHTML=totalSolved;

right.innerHTML=rightAnswer;

wrong.innerHTML=wrongAnswer;


}





function showScore(){


quiz.style.display="none";


scoreBox.style.display="block";



score.innerHTML=

"Round Score : "+roundScore+"/5<br><br>"+

"Total Score : "+totalScore+"/"+current;



roundScore=0;


}







function nextRound(){


scoreBox.style.display="none";



if(current>=questions.length){


alert("Quiz Completed!");

location.reload();


}

else{


quiz.style.display="block";


loadQuestion();


}


}






function rightSound(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

let gain=ctx.createGain();


osc.type="sine";


osc.frequency.setValueAtTime(523.25,ctx.currentTime);

osc.frequency.setValueAtTime(659.25,ctx.currentTime+0.15);

osc.frequency.setValueAtTime(783.99,ctx.currentTime+0.3);



gain.gain.setValueAtTime(0.3,ctx.currentTime);


gain.gain.exponentialRampToValueAtTime(
0.01,
ctx.currentTime+0.6
);



osc.connect(gain);

gain.connect(ctx.destination);



osc.start();

osc.stop(ctx.currentTime+0.6);


}






function wrongSound(){


let ctx=new AudioContext();


let osc=ctx.createOscillator();

let gain=ctx.createGain();



osc.type="square";



osc.frequency.setValueAtTime(220,ctx.currentTime);

osc.frequency.setValueAtTime(160,ctx.currentTime+0.25);



gain.gain.setValueAtTime(0.3,ctx.currentTime);



gain.gain.exponentialRampToValueAtTime(
0.01,
ctx.currentTime+0.5
);



osc.connect(gain);

gain.connect(ctx.destination);



osc.start();

osc.stop(ctx.currentTime+0.5);


}
